<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophisticated Welcome</title>
    <style>
        /* สไตล์แบบ Quiet Luxury */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0a0a0a; /* ดำถ่านแบบพรีเมียม */
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 2.5s ease-in-out;
        }

        p {
            font-size: 1.2rem;
            color: #888;
            letter-spacing: 0.2rem;
            font-weight: 300;
            animation: slideUp 2s ease-out;
        }

        /* ใส่ลูกเล่น Animation เล็กน้อยให้ดูแพง */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* เส้นตกแต่ง */
        .divider {
            width: 50px;
            height: 1px;
            background: #444;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hello World</h1>
        <div class="divider"></div>
        <p>สวัสดีชาวโลก</p>
    </div>

</body>
</html>
